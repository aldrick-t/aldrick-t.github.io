name: Build Typst CV

on:
  push:
    paths:
      - 'cv/**'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

jobs:
  build-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content and manifest
        run: npm run content:check

      - name: Compile CV PDFs
        run: npm run build:cv

      - name: Upload CV artifact
        uses: actions/upload-artifact@v4
        with:
          name: aldrick_tadeo_cvs
          path: public/cv
